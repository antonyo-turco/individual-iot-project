; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:heltec_wifi_lora_32_V4]
platform = espressif32
board = heltec_wifi_lora_32_V4
framework = arduino
board_build.variants_dir = variants
board_build.variant = heltec_V4

; Board-specific settings
board_build.partitions = default_16MB.csv
board_upload.flash_size = 16MB
board_upload.psram_size = 2MB

; Serial communication — V4 uses native USB (no CP2102), DTR/RTS must be disabled
monitor_speed = 115200
monitor_dtr = 0
monitor_rts = 0
upload_speed = 460800

build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1

lib_extra_dirs = ../mqtt-common

; Library dependencies for OLED display
lib_deps =
    adafruit/Adafruit SSD1306 @ ^2.5.7
    kosme/arduinoFFT @ ^2.0.2
    adafruit/Adafruit GFX Library @ ^1.11.9
    knolleary/PubSubClient @ ^2.8
    bblanchon/ArduinoJson @ ^6.21.3
